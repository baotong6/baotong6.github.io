# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies

on:
  push:
    branches:
      - main

jobs:
  jekyll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4' # Use your Ruby version, e.g., '3.1' or '3.2'
          bundler-cache: true

      - name: Build and Deploy
        run: |
          bundle exec jekyll build
          touch .nojekyll
        env:
          JEKYLL_ENV: production
          JEKYLL_BASEURL: /baotong6.github.io

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: jekyll
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an Actions workflow

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
