# Minimal Mistakes configuration for Tong Bao personal homepage

title: "Tong Bao (鲍通)"
description: "Postdoctoral researcher at INAF – Osservatorio Astronomico di Brera, Merate, Italy"
baseurl: "" # for GitHub Pages, set to "" if using username.github.io
url: "https://baotong6.github.io" # replace with your GitHub Pages URL

theme: minimal-mistakes-jekyll

# Author info
author:
  name: "Tong Bao"
  email: "baotong@smail.nju.edu.cn"
  avatar: "/thumbnail.png"

# Social links
social:
  github: "https://github.com/baotong6"
  google_scholar: "https://scholar.google.com/citations?user=8Fr_PVwAAAAJ&hl=zh-CN&oi=sra"
  orcid: "https://orcid.org/my-orcid?orcid=0000-0002-5082-5049"

# Navigation
nav:
  - title: "About"
    url: "/about/"
  - title: "Research"
    url: "/research/"
  - title: "Publications"
    url: "/publications/"
  - title: "CV"
    url: "/bao_cv.pdf"

# Plugins
